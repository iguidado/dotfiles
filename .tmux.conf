# Change le préfixe de Ctrl-b à Ctrl-a (plus ergonomique)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Historique massif pour le scrollback (crucial en debug/sécu)
set -g history-limit 10000

# Mode souris activé (pour redimensionner les splits rapidement)
set -g mouse on

# Numérotation des fenêtres commence à 1
set -g base-index 1
setw -g pane-base-index 1

# Splits intuitifs avec le chemin actuel conservé
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Design : Barre de statut sobre
set -g status-style bg=black,fg=white
set -g status-left '#[fg=green]#S '
set -g status-right '#[fg=yellow]%H:%M #[fg=blue]#H'
