# ============================================================================
# CONFIGURATION TMUX ULTIME (PROFIL DÉVELOPPEUR - SANS SOURIS)
# ============================================================================

# --- COULEURS ET RENDU ---
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB" # Indispensable pour Retrobox dans Vim
set -s escape-time 0                            # Supprime le lag de la touche Echap (crucial pour Vim)
set -g focus-events on                          # Aide Vim à savoir quand il a le focus

# --- PRÉFIXE (RACCOURCI MAÎTRE) ---
# On utilise Alt+a (M-a) qui est très proche de ta touche 'œ'
unbind C-b
set -g prefix M-a
bind M-a send-prefix

# --- NAVIGATION STYLE VIM ---
# Naviguer entre les panneaux avec h, j, k, l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- DÉCOUPAGE DE L'ÉCRAN (Mise à jour) ---


# Séparation horizontale sur la touche =
bind = split-window -v -c "#{pane_current_path}"
unbind %
bind '"' split-window -h

# --- GESTION DE L'ESPACE (PETIT ÉCRAN) ---
set -g base-index 1           # Les fenêtres commencent à 1 (plus logique sur le clavier)
set -g pane-base-index 1      # Les panneaux commencent à 1
set -g renumber-windows on    # Referme les trous dans la numérotation des fenêtres

# ZOOM : Super utile sur petit écran ! 
# Appuie sur 'Prefix + z' pour mettre le panneau actuel en plein écran
# Appuie à nouveau pour revenir au découpage
bind z resize-pane -Z

# Redimensionnement rapide des panneaux (Prefix + Maj + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- INTERFACE VISUELLE (RETROBOX STYLE) ---
set -g status-style bg='#32302f',fg='#ebdbb2'    # Couleurs sombres et lisibles
set -g pane-border-style fg='#504945'           # Bordure panneau inactif
set -g pane-active-border-style fg='#fe8019'    # Bordure orange vif pour le panneau actif
set -g status-left " #[fg=#b8bb26]#S "         # Nom de la session en vert
set -g status-right " #[fg=#fabd2f]%H:%M "      # Heure en jaune

# --- DIVERS ---
set -g mouse off               # On reste 100% au clavier
set -g history-limit 10000     # Pour pouvoir scroller loin dans tes logs
